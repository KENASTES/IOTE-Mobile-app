  { id:"robotics",          name:"Robotics Engineer",                icon:"🦾", desc:"ออกแบบและพัฒนาหุ่นยนต์อุตสาหกรรม",                            tags:["Robotics","Automation","AI/ML"] },
  { id:"startup",           name:"Tech Entrepreneur / Startup",      icon:"🚀", desc:"ก่อตั้งธุรกิจเทคโนโลยีด้าน IoT หรือ AI",                       tags:["Business","Startup","Management"] },

const STEP_LABELS = ["สาขา","วิชาที่สนใจ","อาชีพ","ผลลัพธ์"];

function TagBadge({ tag, idx=0 }) {
  const COLORS = [C.orange, C.navy, C.blue];
  const col = COLORS[idx % 3];
  return (
    <span style={{
      background: col + "66", color: col,
      padding: "2px 8px", borderRadius: 99, fontSize: 11, fontWeight: 600,
      letterSpacing: 0.2, whiteSpace: "nowrap",
    }}>{tag}</span>
  );
}

function ElectiveCard({ el, highlighted }) {
  return (
    <div style={{
      background: C.white,
      border: `1.5px solid ${highlighted ? C.blue : "#0584AF33"}`,
      borderRadius: 12, padding: "14px 16px", position: "relative",
      boxShadow: highlighted ? `0 2px 12px ${C.blue}22` : "0 1px 3px rgba(1,58,93,0.05)",
      height: "100%", display: "flex", flexDirection: "column", justifyContent: "flex-start",
    }}>
      {highlighted && (
        <div style={{
          position: "absolute", top: -10, right: 12,
          background: C.orange, color: C.white,
          fontSize: 10, fontWeight: 800, padding: "2px 10px", borderRadius: 99, letterSpacing: 0.8,
        }}>★ แนะนำ</div>
      )}
      <div style={{ fontSize: 10, color: "#0584AF", fontFamily: "monospace", marginBottom: 3 }}>{el.code}</div>
      <div style={{ fontSize: 13, fontWeight: 700, color: C.navy, lineHeight: 1.4, marginBottom: 3 }}>{el.name}</div>
      <div style={{ fontSize: 11, color: "#013A5D", marginBottom: 8, lineHeight: 1.4 }}>{el.nameTH}</div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
        {el.tags.map((t,i) => <TagBadge key={t} tag={t} idx={i}/>)}
      </div>
    </div>
  );
}

function scorePool(pool, careerIds, subjectCodes) {
  const cTags = [...new Set(careerIds.flatMap(id => CAREERS.find(c=>c.id===id)?.tags||[]))];
  const sTags = [...new Set(subjectCodes.flatMap(code => pool.find(e=>e.code===code)?.tags||[]))];
  const all   = [...new Set([...cTags,...sTags])];
  return [...pool]
    .map(el => { const m=el.tags.filter(t=>all.includes(t)).length; return{...el,score:m+m/el.tags.length}; })
    .sort((a,b)=>b.score-a.score);
}

function App() {
  const [step,        setStep]        = useState(0);
  const [program,     setProgram]     = useState(null);
  const [selSubjects, setSelSubjects] = useState([]);
  const [selCareers,  setSelCareers]  = useState([]);
  const [result,      setResult]      = useState(null);
  const [search,      setSearch]      = useState("");

  const pool = program==="dual" ? [...IOT_ELECTIVES,...PHYSICS_ELECTIVES] : IOT_ELECTIVES;

  const toggleSub = code => setSelSubjects(p=>p.includes(code)?p.filter(c=>c!==code):[...p,code]);
  const toggleCar = id   => setSelCareers(p=>{
    if(p.includes(id)) return p.filter(c=>c!==id);
    if(p.length>=3)    return p;
    return [...p,id];
  });

  const next = () => {
    if(step===2){
      const iotScored  = scorePool(IOT_ELECTIVES,  selCareers, selSubjects);
      const physScored = program==="dual" ? scorePool(PHYSICS_ELECTIVES, selCareers, selSubjects) : [];
      setResult({
        iotTop:    iotScored.slice(0,3),
        physTop:   physScored.slice(0,1),
        iotExtra:  iotScored.slice(3,6),
        physExtra: physScored.slice(1,3),
      });
    }
    setStep(s=>s+1);
  };
  const reset = () => { setStep(0);setProgram(null);setSelSubjects([]);setSelCareers([]);setResult(null);setSearch(""); };
  const canNext = () => step===0?!!program : step===1?true : selCareers.length>0;

  return (
    <div style={{minHeight:"100vh",background:C.white,fontFamily:"'Inter',sans-serif",color:C.navy,width:"100%"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        html, body { background: #ffffff; margin: 0; padding: 0; width: 100%; height: 100%; overflow: auto; }
        #root { width: 100%; }
        ::-webkit-scrollbar{width:4px}
        ::-webkit-scrollbar-thumb{background:#0584AF55;border-radius:4px}
        button,input{font-family:inherit}
        @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
        .fu{animation:fadeUp 0.38s ease forwards}
        .main-wrap {
          max-width: 700px;
          margin: 0 auto;
          padding: 28px 18px 72px;
          width: 100%;
        }
        @media(max-width: 400px) {
          .main-wrap { padding: 20px 12px 60px; }
        }
        .program-grid {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 14px;
          align-items: stretch;
        }
        @media(max-width: 520px) {
          .program-grid { grid-template-columns: 1fr; }
        }
        .subject-grid {
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
          max-width: 100%;
          gap: 8px;
          margin-bottom: 18px;
          align-items: stretch;
        }
        @media(min-width: 700px) {
          .subject-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media(max-width: 480px) {
          .subject-grid { grid-template-columns: 1fr 1fr; }
        }
        @media(max-width: 360px) {
          .subject-grid { grid-template-columns: 1fr; }
        }
        .career-grid {
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
          gap: 10px;
          align-items: stretch;
        }
        @media(min-width: 700px) {
          .career-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media(max-width: 480px) {
          .career-grid { grid-template-columns: 1fr 1fr; }
        }
        @media(max-width: 360px) {
          .career-grid { grid-template-columns: 1fr; }
        }
        .result-grid {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          gap: 12px;
          margin-bottom: 22px;
          align-items: stretch;
        }
        @media(max-width: 600px) {
          .result-grid { grid-template-columns: 1fr 1fr; }
        }
        @media(max-width: 420px) {
          .result-grid { grid-template-columns: 1fr; }
        }
        .step-wrap {
          display: flex;
          justify-content: center;
          align-items: center;
          margin-bottom: 28px;
          overflow-x: auto;
          padding-bottom: 2px;
        }
        .step-connector {
          width: 52px;
          height: 2px;
          margin: 0 5px;
          margin-top: -18px;
          flex-shrink: 0;
          transition: all 0.25s;
        }
        @media(max-width: 400px) {
          .step-connector { width: 28px; }
        }
        .main-card {
          background: #D9D9D966;
          border-radius: 18px;
          padding: 26px 26px 22px;
        }
        @media(max-width: 480px) {
          .main-card { padding: 18px 14px 18px; border-radius: 14px; }
        }
      `}</style>

      {/* Navbar */}
      <div style={{position:"fixed",top:0,left:0,right:0,zIndex:1000,background:C.navy,height:40,display:"flex",alignItems:"center",padding:"0 20px",boxShadow:"0 2px 8px rgba(1,58,93,0.18)",width:"100%",boxSizing:"border-box"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div>
            <div style={{fontSize:13,fontWeight:800,color:C.white,letterSpacing:0.2}}>IoT Elective Advisor</div>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.45)",letterSpacing:0.3}}>KMITL · ภาควิชาวิศวกรรมไอโอทีและสารสนเทศ</div>
          </div>
        </div>
      </div>

      <div className="main-wrap" style={{paddingTop:60}}>

        {/* Hero */}
        <div className="fu" style={{textAlign:"center",marginBottom:32}}>
          <h1 style={{fontSize:"clamp(22px,4vw,38px)",fontWeight:800,color:C.navy,letterSpacing:-0.5,lineHeight:1.25,marginBottom:8}}>

        {/* Main card */}

          {/* Step 0 */}
          {step===0 && (

              <h2 style={{fontSize:19,fontWeight:800,color:C.navy,marginBottom:4}}>คุณอยู่สาขาอะไร?</h2>

              <div className="program-grid">
                {Object.values(PROGRAMS).map(p=>(
                  <button key={p.id} onClick={()=>setProgram(p.id)} style={{
                    background:program===p.id?`${p.color}0E`:C.white,
                    border:`2px solid ${program===p.id?p.color:"#0584AF33"}`,
                    borderRadius:14,padding:"24px 20px",cursor:"pointer",textAlign:"left",
                    transition:"all 0.2s",display:"flex",flexDirection:"column",alignItems:"flex-start",justifyContent:"flex-start",
                    boxShadow:program===p.id?`0 0 0 3px ${p.color}22`:"none",
                    width:"100%",
                  }}>
                    {p.id==="iot" ? (
                      <div style={{marginBottom:14,width:48}}>
                        <svg width="48" height="36" viewBox="0 0 48 36" fill="none" xmlns="http://www.w3.org/2000/svg">
                          <path d="M6 12C6 12 13 4 24 4C35 4 42 12 42 12" stroke={C.orange} strokeWidth="3" strokeLinecap="round"/>
                          <path d="M12 18C12 18 17 12 24 12C31 12 36 18 36 18" stroke={C.orange} strokeWidth="3" strokeLinecap="round"/>
                          <path d="M18 24C18 24 20.5 20 24 20C27.5 20 30 24 30 24" stroke={C.orange} strokeWidth="3" strokeLinecap="round"/>
                          <circle cx="24" cy="31" r="3" fill={C.orange}/>
                        </svg>
                        <div style={{fontSize:13,fontWeight:800,color:C.orange,letterSpacing:1,textAlign:"center"}}>IoT</div>
                      </div>
                    ) : (
                      <svg width="44" height="44" viewBox="0 0 44 44" fill="none" style={{marginBottom:14}} xmlns="http://www.w3.org/2000/svg">
                        <circle cx="22" cy="22" r="5" stroke={C.orange} strokeWidth="2.5"/>
                        <ellipse cx="22" cy="22" rx="18" ry="8" stroke={C.orange} strokeWidth="2.5"/>
                        <ellipse cx="22" cy="22" rx="18" ry="8" stroke={C.orange} strokeWidth="2.5" transform="rotate(60 22 22)"/>
                        <ellipse cx="22" cy="22" rx="18" ry="8" stroke={C.orange} strokeWidth="2.5" transform="rotate(120 22 22)"/>
                      </svg>
                    )}
                    <span style={{display:"inline-block",fontSize:11,fontWeight:700,background:p.color,color:C.white,borderRadius:99,padding:"4px 14px",marginBottom:14}}>{p.badge}</span>

          )}

          {/* Step 1 */}
          {step===1 && (
            <div className="fu">
              <h2 style={{fontSize:19,fontWeight:800,color:C.navy,marginBottom:4}}>วิชาไหนที่คุณสนใจเป็นพิเศษ?</h2>
              <p style={{fontSize:13,color:"#013A5D",marginBottom:14}}>
                เลือกได้อิสระ — ผลลัพธ์จะแนะนำวิชาที่ตรงกับอาชีพของคุณที่สุด
                {program==="dual" && " (ทั้งวิชา IoT ปี 3 และฟิสิกส์อุตสาหกรรม ปี 2)"}
              </p>

              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍  ค้นหาวิชา..." style={{
                width:"100%",background:C.white,border:"1.5px solid #0584AF33",
                borderRadius:10,padding:"10px 14px",fontSize:14,color:C.navy,marginBottom:14,
              }}/>

              {(search===""||IOT_ELECTIVES.some(e=>e.name.toLowerCase().includes(search.toLowerCase())||e.nameTH.includes(search)||e.code.includes(search))) && (
                <>
                  <div style={{fontSize:12,fontWeight:800,color:C.orange,marginBottom:8,letterSpacing:0.3}}>
                    📚 วิชาบังคับเลือก IoT — ปี 3
                  </div>
                  <div className="subject-grid">
                    {IOT_ELECTIVES.filter(el=>
                      !search||el.name.toLowerCase().includes(search.toLowerCase())||el.nameTH.includes(search)||el.code.includes(search)||el.tags.some(t=>t.toLowerCase().includes(search.toLowerCase()))
                    ).map(el=>{
                      const sel=selSubjects.includes(el.code);
                      return (
                        <button key={el.code} onClick={()=>toggleSub(el.code)} style={{
                          background:sel?`${C.blue}0C`:C.white,
                          border:`1.5px solid ${sel?C.blue:"#0584AF33"}`,
                          borderRadius:10,padding:"10px 12px",cursor:"pointer",textAlign:"left",color:C.navy,transition:"all 0.15s",
                          width:"100%",height:"100%",display:"flex",flexDirection:"column",justifyContent:"flex-start",
                        }}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:3}}>
                            <div style={{fontSize:10,color:"#0584AF",fontFamily:"monospace"}}>{el.code}</div>
                            {sel && <div style={{width:17,height:17,borderRadius:"50%",background:C.blue,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:C.white,fontWeight:800,flexShrink:0}}>✓</div>}
                          </div>
                          <div style={{fontSize:12,fontWeight:700,color:C.navy,lineHeight:1.35,marginBottom:4}}>{el.name}</div>
                          <div style={{fontSize:11,color:"#013A5D",marginBottom:6,lineHeight:1.3}}>{el.nameTH}</div>
                          <div style={{display:"flex",flexWrap:"wrap",gap:3}}>{el.tags.slice(0,3).map((t,i)=><TagBadge key={t} tag={t} idx={i}/>)}</div>
                        </button>
                      );
                    })}
                  </div>
                </>
              )}

              {program==="dual" && (search===""||PHYSICS_ELECTIVES.some(e=>e.name.toLowerCase().includes(search.toLowerCase())||e.nameTH.includes(search)||e.code.includes(search))) && (
                <>
                  <div style={{fontSize:12,fontWeight:800,color:C.orange,marginBottom:8,letterSpacing:0.3}}>
                    🔬 วิชาเลือกฟิสิกส์อุตสาหกรรม — ปี 2
                  </div>
                  <div className="subject-grid">
                    {PHYSICS_ELECTIVES.filter(el=>
                      !search||el.name.toLowerCase().includes(search.toLowerCase())||el.nameTH.includes(search)||el.code.includes(search)||el.tags.some(t=>t.toLowerCase().includes(search.toLowerCase()))
                    ).map(el=>{
                      const sel=selSubjects.includes(el.code);
                      return (
                        <button key={el.code} onClick={()=>toggleSub(el.code)} style={{
                          background:sel?`${C.orange}0C`:C.white,
                          border:`1.5px solid ${sel?C.orange:"#0584AF33"}`,
                          borderRadius:10,padding:"10px 12px",cursor:"pointer",textAlign:"left",color:C.navy,transition:"all 0.15s",
                          width:"100%",height:"100%",display:"flex",flexDirection:"column",justifyContent:"flex-start",
                        }}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:3}}>
                            <div style={{fontSize:10,color:"#0584AF",fontFamily:"monospace"}}>{el.code}</div>
                            {sel && <div style={{width:17,height:17,borderRadius:"50%",background:C.orange,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:C.white,fontWeight:800,flexShrink:0}}>✓</div>}
                          </div>
                          <div style={{fontSize:12,fontWeight:700,color:C.navy,lineHeight:1.35,marginBottom:4}}>{el.name}</div>
                          <div style={{fontSize:11,color:"#013A5D",marginBottom:6,lineHeight:1.3}}>{el.nameTH}</div>
                          <div style={{display:"flex",flexWrap:"wrap",gap:3}}>{el.tags.slice(0,3).map((t,i)=><TagBadge key={t} tag={t} idx={i}/>)}</div>
                        </button>
                      );
                    })}
                  </div>
                </>
              )}
            </div>
          )}

          {/* Step 2 */}
          {step===2 && (
            <div className="fu">
              <h2 style={{fontSize:19,fontWeight:800,color:C.navy,marginBottom:4}}>อยากทำงานอะไร?</h2>
              <p style={{fontSize:13,color:"#013A5D",marginBottom:8}}>เลือกได้ 1–3 อาชีพ</p>
              <div style={{display:"inline-block",marginBottom:18,background:selCareers.length>0?`${C.orange}14`:C.white,border:`1px solid ${selCareers.length>0?C.orange:"#0584AF33"}`,borderRadius:99,padding:"4px 16px",fontSize:13,color:selCareers.length>0?C.orange:"#0584AF",fontWeight:700}}>
                เลือกแล้ว {selCareers.length} / 3
              </div>
              <div className="career-grid">
                {CAREERS.map(c=>{
                  const sel=selCareers.includes(c.id);
                  const dis=!sel&&selCareers.length>=3;
                  return (
                    <button key={c.id} onClick={()=>toggleCar(c.id)} disabled={dis} style={{
                      background:sel?`${C.blue}0C`:C.white,
                      border:`1.5px solid ${sel?C.blue:"#0584AF33"}`,
                      borderRadius:12,padding:"14px",cursor:dis?"not-allowed":"pointer",
                      textAlign:"left",color:C.navy,opacity:dis?0.3:1,transition:"all 0.15s",
                      boxShadow:sel?`0 0 0 3px ${C.blue}18`:"none",
                      width:"100%",height:"100%",display:"flex",flexDirection:"column",justifyContent:"flex-start",
                    }}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                        <div style={{fontSize:24,marginBottom:8}}>{c.icon}</div>
                        {sel && <div style={{width:19,height:19,borderRadius:"50%",background:C.blue,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:C.white,fontWeight:800}}>✓</div>}
                      </div>
                      <div style={{fontSize:13,fontWeight:800,color:C.navy,marginBottom:4,lineHeight:1.3}}>{c.name}</div>
                      <div style={{fontSize:11,color:"#013A5D",lineHeight:1.5,marginBottom:8}}>{c.desc}</div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:3}}>{c.tags.slice(0,3).map((t,i)=><TagBadge key={t} tag={t} idx={i}/>)}</div>
                    </button>
                  );
                })}
              </div>
            </div>
          )}

          {/* Step 3 */}
          {step===3 && result && (
            <div className="fu">
              <div style={{textAlign:"center",marginBottom:24}}>
                <div style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:50,height:50,borderRadius:"50%",background:`${C.orange}15`,fontSize:26,marginBottom:10}}>🎯</div>
                <h2 style={{fontSize:20,fontWeight:800,color:C.navy,marginBottom:10}}>วิชาเลือกที่แนะนำสำหรับคุณ</h2>
                <div style={{display:"flex",justifyContent:"center",gap:8,flexWrap:"wrap"}}>
                  {selCareers.map(cid=>{
                    const career=CAREERS.find(c=>c.id===cid);
                    return career?(
                      <span key={cid} style={{background:`${C.blue}10`,border:`1px solid ${C.blue}35`,borderRadius:99,padding:"4px 14px",fontSize:12,color:C.blue,fontWeight:700}}>
                        {career.icon} {career.name}
                      </span>
                    ):null;
                  })}
                </div>
              </div>

              {result.iotTop.length>0 && (
                <>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
                    <div style={{flex:1,height:1.5,background:`${C.orange}45`}}/>
                    <div style={{fontSize:12,fontWeight:800,color:C.orange,letterSpacing:0.8,whiteSpace:"nowrap"}}>★ วิชา IoT ปี 3 — แนะนำที่สุด</div>
                    <div style={{flex:1,height:1.5,background:`${C.orange}45`}}/>
                  </div>
                  <div className="result-grid">
                    {result.iotTop.map(el=><ElectiveCard key={el.code} el={el} highlighted/>)}
                  </div>
                </>
              )}

              {program==="dual" && result.physTop.length>0 && (
                <>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
                    <div style={{flex:1,height:1.5,background:`${C.orange}45`}}/>
                    <div style={{fontSize:12,fontWeight:800,color:C.orange,letterSpacing:0.8,whiteSpace:"nowrap"}}>★ วิชาฟิสิกส์อุตสาหกรรม ปี 2 — แนะนำที่สุด</div>
                    <div style={{flex:1,height:1.5,background:`${C.orange}45`}}/>
                  </div>
                  <div className="result-grid">
                    {result.physTop.map(el=><ElectiveCard key={el.code} el={el} highlighted/>)}
                  </div>
                </>
              )}

              {(result.iotExtra.length>0||(program==="dual"&&result.physExtra.length>0)) && (
                <>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
                    <div style={{flex:1,height:1,background:"#0584AF33"}}/>
                    <div style={{fontSize:12,fontWeight:700,color:"#0584AF",letterSpacing:0.8,whiteSpace:"nowrap"}}>○ น่าสนใจเพิ่มเติม</div>
                    <div style={{flex:1,height:1,background:"#0584AF33"}}/>
                  </div>
                  <div className="result-grid">
                    {result.iotExtra.map(el=><ElectiveCard key={el.code} el={el}/>)}
                    {program==="dual" && result.physExtra.map(el=><ElectiveCard key={el.code} el={el}/>)}
                  </div>
                </>
              )}

              <div style={{background:`${C.blue}09`,border:`1px solid ${C.blue}25`,borderRadius:12,padding:"14px 18px",marginBottom:18}}>
                <div style={{fontSize:13,fontWeight:800,color:C.blue,marginBottom:5}}>💡 เคล็ดลับ</div>
                <div style={{fontSize:13,color:"#013A5D",lineHeight:1.8}}>
                  วิชาที่แนะนำคำนวณจากความสัมพันธ์ระหว่างทักษะที่ต้องการในอาชีพกับเนื้อหาของวิชา
                  — ควรปรึกษาอาจารย์ที่ปรึกษาก่อนลงทะเบียน
                  {program==="dual" && " และตรวจสอบเงื่อนไขหลักสูตรสองปริญญาด้วย"}
                </div>
              </div>

              <button onClick={reset} style={{width:"100%",padding:"12px",borderRadius:10,cursor:"pointer",background:C.white,border:"1.5px solid #0584AF33",color:"#013A5D",fontSize:14,fontWeight:700}}>
                ↩ เริ่มใหม่
              </button>
            </div>
          )}
        </div>

        {/* Navigation */}
        {step<3 && (
          <div style={{display:"flex",gap:12,marginTop:16,justifyContent:step===0?"center":"space-between"}}>
            {step>0 && (
              <button onClick={()=>setStep(s=>s-1)} style={{padding:"12px 22px",borderRadius:10,cursor:"pointer",background:C.white,border:"1.5px solid #0584AF33",color:"#013A5D",fontSize:14,fontWeight:700,boxShadow:"0 1px 4px rgba(1,58,93,0.05)",whiteSpace:"nowrap"}}>
                ← ย้อนกลับ
              </button>
            )}
            <button onClick={next} disabled={!canNext()} style={{
              flex:1,maxWidth:step===0?270:"none",
              padding:"12px 24px",borderRadius:10,
              cursor:canNext()?"pointer":"not-allowed",
              background:canNext()?C.orange:"#0584AF33",
              border:"none",color:canNext()?C.white:"#0584AF",
              fontSize:15,fontWeight:800,transition:"all 0.2s",
              boxShadow:canNext()?`0 4px 16px ${C.orange}45`:"none",
              whiteSpace:"nowrap",
            }}>
              {step===2?"✦ ดูวิชาที่แนะนำ":step===1?"ถัดไป →":"เริ่มเลย →"}
            </button>
          </div>
        )}
      </div>

      <div style={{borderTop:"1px solid #0584AF33",padding:"14px 24px",textAlign:"center",fontSize:11,color:"#0584AF"}}>
        ภาควิชาวิศวกรรมไอโอทีและสารสนเทศ · คณะวิศวกรรมศาสตร์ · สถาบันเทคโนโลยีพระจอมเกล้าเจ้าคุณทหารลาดกระบัง
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
