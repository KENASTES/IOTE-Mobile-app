<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luvvy – IoTE KMITL AI Chat</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700;800&family=Sarabun:wght@300;400;500;600&display=swap"
    rel="stylesheet">

  <style>
    /* CSS ของคุณสวยงามและสมบูรณ์แล้ว ไม่มีการเปลี่ยนแปลงครับ */
    :root {
      --bg: #F8FAFC;
      --orange: #F36F21;
      --white: #FFFFFF;
      --teal: #0584AF;
      --navy: #013A5D;
      --teal-light: #C8E9F4;
      --muted: #6B8A9E;
      --text: #0D2B3E;
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Sarabun', sans-serif;
      background: var(--bg);
      height: 100vh;
      display: flex;
      flex-direction: column;
      color: var(--text);
      overflow: hidden;
    }

    nav {
      background: var(--white);
      display: flex;
      align-items: center;
      padding: 0 24px;
      height: 68px;
      border-bottom: 2px solid var(--teal-light);
      flex-shrink: 0;
      box-shadow: 0 2px 16px rgba(1, 58, 93, .08);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-logo-img {
      height: 50px;
      width: auto;
      object-fit: contain;
    }

    .logo-fallback {
      display: none;
      background: var(--navy);
      border-radius: 8px;
      padding: 5px 11px;
      font-family: 'Kanit', sans-serif;
      font-size: 17px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: 1px;
    }

    .logo-fallback span {
      color: var(--orange);
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.4;
    }

    .logo-text .dept {
      font-family: 'Kanit', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--navy);
    }

    .logo-text .sub {
      font-family: 'Sarabun', sans-serif;
      font-size: 11px;
      color: var(--muted);
    }

    .chat-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 100%;
      width: 100%;
      margin: 0;
      height: calc(100vh - 68px);
      overflow: hidden;
    }

    .chat-header {
      background: linear-gradient(135deg, var(--teal) 0%, var(--navy) 100%);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .chat-header::before {
      content: '';
      position: absolute;
      top: -40px;
      right: -20px;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .07);
    }

    .chat-header::after {
      content: '';
      position: absolute;
      bottom: -50px;
      left: 50%;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .05);
    }

    .avatar-wrap {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(1, 58, 93, .25);
      position: relative;
      overflow: hidden;
    }

    .avatar-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .avatar-online {
      width: 13px;
      height: 13px;
      background: #4CAF50;
      border-radius: 50%;
      position: absolute;
      bottom: 2px;
      right: 2px;
      border: 2px solid var(--white);
      animation: pulse 2s infinite;
      z-index: 2;
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
        opacity: 1
      }

      50% {
        transform: scale(1.25);
        opacity: .7
      }
    }

    .chat-header-info h2 {
      font-family: 'Kanit', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
    }

    .chat-header-info p {
      font-family: 'Sarabun', sans-serif;
      font-size: 12.5px;
      color: rgba(255, 255, 255, .85);
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 2px;
    }

    .dot {
      width: 7px;
      height: 7px;
      background: #4CAF50;
      border-radius: 50%;
      display: inline-block;
    }

    .messages {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 20px 20px 10px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar {
      width: 4px;
    }

    .messages::-webkit-scrollbar-thumb {
      background: var(--teal-light);
      border-radius: 4px;
    }

    .date-divider {
      font-family: 'Sarabun', sans-serif;
      font-size: 11px;
      color: var(--muted);
      margin: 4px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .date-divider::before,
    .date-divider::after {
      content: '';
      flex: 1;
      border-top: 1px solid var(--teal-light);
    }

    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      animation: msgIn .3s ease;
    }

    @keyframes msgIn {
      from {
        opacity: 0;
        transform: translateY(10px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .msg-row.user {
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(1, 58, 93, .12);
      overflow: hidden;
    }

    .msg-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .msg-avatar.user-av {
      background: linear-gradient(135deg, var(--orange) 0%, #F9A76A 100%);
      font-family: 'Kanit', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: var(--white);
      overflow: visible;
    }

    .msg-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 68%;
    }

    .msg-row.user .msg-group {
      align-items: flex-end;
    }

    .sender-name {
      font-family: 'Sarabun', sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      padding: 0 12px;
    }

    .bubble {
      padding: 11px 16px;
      border-radius: var(--radius);
      font-family: 'Sarabun', sans-serif;
      font-size: 15px;
      line-height: 1.65;
      word-break: break-word;
      box-shadow: 0 2px 8px rgba(1, 58, 93, .07);
    }

    .bubble.bot {
      background: var(--white);
      color: var(--text);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--teal-light);
    }

    .bubble.user {
      background: linear-gradient(135deg, var(--teal) 0%, var(--navy) 100%);
      color: var(--white);
      border-bottom-right-radius: 4px;
    }

    .bubble.typing {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 20px;
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      background: #9CC5D8;
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing-dot:nth-child(2) {
      animation-delay: .2s
    }

    .typing-dot:nth-child(3) {
      animation-delay: .4s
    }

    @keyframes bounce {

      0%,
      80%,
      100% {
        transform: translateY(0)
      }

      40% {
        transform: translateY(-8px)
      }
    }

    .msg-time {
      font-family: 'Sarabun', sans-serif;
      font-size: 10px;
      color: var(--muted);
      padding: 0 12px;
      margin-top: 2px;
    }

    .input-bar {
      padding: 12px 20px 16px;
      background: var(--white);
      border-top: 2px solid var(--teal-light);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .input-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      background: var(--bg);
      border: 1.5px solid var(--teal-light);
      border-radius: 28px;
      padding: 0 16px;
      transition: border-color .2s, box-shadow .2s;
    }

    .input-wrap:focus-within {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(5, 132, 175, .15);
    }

    .input-wrap input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      font-family: 'Sarabun', sans-serif;
      font-size: 15px;
      color: var(--text);
      padding: 11px 0;
    }

    .input-wrap input::placeholder {
      color: #9BB5C4;
    }

    .emoji-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 20px;
      padding: 4px;
      opacity: .65;
      line-height: 1;
      transition: opacity .2s, transform .2s;
    }

    .emoji-btn:hover {
      opacity: 1;
      transform: scale(1.2);
    }

    .send-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--orange) 0%, #F9A76A 100%);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(243, 111, 33, .35);
      transition: transform .2s, box-shadow .2s;
      flex-shrink: 0;
    }

    .send-btn:hover {
      transform: scale(1.08) rotate(-5deg);
      box-shadow: 0 6px 20px rgba(243, 111, 33, .45);
    }

    .send-btn svg {
      width: 20px;
      height: 20px;
      fill: var(--white);
    }
  </style>
</head>

<body>
  <nav>
    <div class="nav-logo">
      <img class="nav-logo-img" src="iote-logo.jpg" alt="IoTE KMITL"
        onerror="this.style.display='none';document.getElementById('logo-fb').style.display='flex'">
      <div class="logo-fallback" id="logo-fb">i<span>OT</span>E<span>.</span></div>
      <div class="logo-text">
        <span class="dept">IoTE KMITL</span>
        <span class="sub">E-12 Building · iote@kmitl.ac.th</span>
      </div>
    </div>
  </nav>

  <div class="chat-wrapper">
    <div class="chat-header">
      <div class="avatar-wrap">
        <img src="luvvy.jpg" alt="Luvvy" onerror="this.outerHTML='<span style=\'font-size:28px\'>🤖</span>'">
        <div class="avatar-online"></div>
      </div>
      <div class="chat-header-info">
        <h2>Luvvy IoTE KMITL</h2>
        <p><span class="dot"></span> Online อยู่นะคะ พร้อมให้บริการ 24/7</p>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="date-divider">วันนี้</div>
      <div class="msg-row bot">
        <div class="msg-avatar"><img src="luvvy.jpg" alt="Luvvy" onerror="this.outerHTML='🤖'"></div>
        <div class="msg-group">
          <span class="sender-name">Luvvy IoTE KMITL</span>
          <div class="bubble bot">น้อง Luvvy พร้อมให้บริการแล้วค่ะ!! 🎉</div>
          <div class="bubble bot">สวัสดีค่ะ ยินดีต้อนรับสู่ IoTE KMITL<br>มีอะไรให้น้อง Luvvy ช่วยไหมคะ? 😊</div>
          <span class="msg-time" id="initTime"></span>
        </div>
      </div>
    </div>

    <div class="input-bar">
      <div class="input-wrap">
        <input type="text" id="msgInput" placeholder="พิมพ์ข้อความ..." onkeydown="if(event.key==='Enter')sendMsg()">
      </div>
      <button class="send-btn" onclick="sendMsg()">
        <svg viewBox="0 0 24 24">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
        </svg>
      </button>
    </div>
  </div>
</body>

<script src="vector_search.js"></script>
<script src="Chatbot_backend.js"></script>

</html>
